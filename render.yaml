# PillScan — Render Blueprint (2 projects from one repo)
# ===========================================================================
# This single file deploys the whole project on Render and fixes the
# "open Dockerfile: no such file or directory" error by pointing Render at the
# Dockerfile *inside each subfolder* (Render looks at the repo root by default).
#
#   pillscan-api  ->  FastAPI backend  (Docker, ./backend)   uses SQLite
#   pillscan-web  ->  Frontend PWA     (static, ./frontend)
#
# Pill identification and leaflet summarization both run entirely on Gemini —
# there is no local AI inference service to deploy.
#
# HOW TO DEPLOY:
#   1. Commit & push this repo to GitHub (make sure render.yaml is included).
#   2. Render dashboard: New +  ->  Blueprint  ->  pick the PillScan repo.
#   3. Render reads this file and creates both services.
#   4. After the FIRST deploy, note the REAL URL Render assigns (the name
#      below may get a random suffix if taken). Then:
#        - open  pillscan-api  -> Environment -> set GEMINI_API_KEY (and
#          optionally GEMINI_API_KEY_2..5 for failover)
#        - edit the two rewrite destinations under pillscan-web below to the
#          real pillscan-api URL, commit, and redeploy.
#
# NOTE ON SQLite: Render's free filesystem is EPHEMERAL — the SQLite file is
# wiped on every deploy/restart, so data resets. That is fine for a demo. For
# permanent storage, attach a paid Render Disk mounted at /app, or switch to a
# managed PostgreSQL database.
# ===========================================================================

services:
  # ── FastAPI Backend (Docker + SQLite) ─────────────────────────────────
  - type: web
    name: pillscan-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend          # <-- the fix: build from backend/, not repo root
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      # Database. Default is SQLite inside the container — EPHEMERAL: it is wiped
      # on every deploy/restart, so accounts + stored keys reset.
      #
      # 👉 FOR PERMANENT STORAGE THAT SURVIVES UPDATES (free, no paid Render DB):
      #    create a free Postgres on Neon (neon.tech) or Supabase (supabase.com),
      #    copy its connection string, and paste it here as DATABASE_URL, e.g.
      #    postgresql://user:pass@ep-xxx.neon.tech/dbname?sslmode=require
      #    The app auto-converts it to the async driver, strips libpq-only params,
      #    and enables TLS — no other change needed. Data then persists across
      #    every redeploy.
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pillscan.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["*"]'
      # ── Admin account (seeded on startup if missing) ──
      # Set these in the Render dashboard (kept out of the repo). If left unset,
      # the app falls back to the defaults in app/config.py. Change the password!
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # ── Vision LLM (Google Gemini) — pill ID + leaflet + drug assistant ──
      # EASIEST: sign in as an ADMIN and add your key in the app (AI settings) —
      # admin keys are shared automatically with EVERY user, so these server env
      # keys are OPTIONAL. They still work as an extra shared fallback (up to five,
      # tried in order with automatic failover). Paste your key(s) here if you
      # prefer configuring them at the server level instead of in the app.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GEMINI_API_KEY_5
        sync: false

  # ── Frontend PWA (static site) ────────────────────────────────────────
  - type: web
    name: pillscan-web
    runtime: static
    staticPublishPath: ./frontend
    autoDeploy: true
    # Keep the frontend on the same origin as the API by proxying these paths
    # to the backend. Update the destinations to the REAL pillscan-api URL
    # after the first deploy.
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pillscan-api.onrender.com/api/*
      - type: rewrite
        source: /uploads/*
        destination: https://pillscan-api.onrender.com/uploads/*
